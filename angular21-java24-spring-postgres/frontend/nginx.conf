server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Routing Angular ────────────────────────────────────────────────────────
    # Redirige toutes les routes vers index.html pour que le router Angular
    # prenne en charge la navigation côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy vers le backend Spring ───────────────────────────────────────────
    # Toutes les requêtes préfixées /api/ sont transmises au service "backend".
    # Le nom "backend" correspond au nom du service dans compose.prod.yml.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
